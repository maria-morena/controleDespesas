name: CI - Controle de Despesas

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name:  Clonar repositório
        uses: actions/checkout@v4

      - name:  Instalar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.1

      - name:  Rodar Lint
        run: find . -name "*.php" -exec php -l {} \;

      - name:  Rodar Testes
        run: php tests/testes.php